
error_log /dev/stdout info;
#error_log /dev/stdout debug;
#access_log /dev/stdout;

# Disable server name header
server_tokens off;

proxy_cache_path cache levels=1:2 keys_zone=api_token_cache:10m max_size=10g inactive=5m use_temp_path=off;

# Identity provider (Keycloak)
server {
    listen                80;
    server_name           id.localhost;

    root                 /usr/share/nginx/html;

    resolver 127.0.0.11 ipv6=off;

    location /auth {

        if ( $request_uri ~* ^.+\. ) {
          access_log off;
        }

        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    X-Forwarded-Host   $host;
        proxy_set_header    X-Forwarded-Port   $server_port;

        proxy_pass              http://keycloak/auth;
        proxy_connect_timeout   2s;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        break;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# Frontend applications
server {
    listen                80;
    server_name           apps.localhost;

    root                 /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# API gateway with phantom token translation
server {
    listen                80;
    server_name           api.localhost;

    root                 /usr/share/nginx/html;

    resolver 127.0.0.11 ipv6=off;

    location /api {
        # enables phantom_token translation
        # requires load_module /usr/lib/nginx/modules/ngx_curity_http_phantom_token_module.so;
        phantom_token on;
        phantom_token_introspection_endpoint keycloak;

        proxy_pass http://echo-backend/api;
    }

    location keycloak {
# prevent the introspection endpoint being externally available.
        internal;
# Set to off to avoid using the main request's headers in the introspection subrequest.
        proxy_pass_request_headers off;

        proxy_set_header Accept "application/jwt";
        proxy_set_header Content-Type "application/x-www-form-urlencoded";
        proxy_set_header Authorization "Basic ${CUSTOM_INTROSPECTION_AUTH_HEADER}";

        proxy_cache_methods POST;
        proxy_cache api_token_cache;
        proxy_cache_key $request_body;
# Ignore cache-control headers from keycloak
        proxy_ignore_headers Set-Cookie Cache-Control Expires;

        proxy_buffer_size 16k;
        proxy_buffers 4 16k;

# Store tokens on 200 OK for 60 seconds
        proxy_cache_valid 200 60s;

# proxy_cache_lock on — when a cache entry expires, only one request goes to Keycloak for introspection;
#   other concurrent requests wait for the cache to be repopulated instead of all hitting Keycloak simultaneously
        proxy_cache_lock on;

# proxy_cache_use_stale error timeout updating — serves the stale cached response while the cache is being updated
#   (or if there's an error/timeout), preventing the pread() Bad file descriptor race
        proxy_cache_use_stale error timeout updating;

# proxy_cache_background_update on — refreshes expired cache entries via a background subrequest, so the client immediately gets the stale (still valid)
#   response without waiting for Keycloak
        proxy_cache_background_update on;

        proxy_pass "${CUSTOM_INTROSPECTION_ENDPOINT}";
    }
}

upstream echo-backend {
    server echo-server:9080 fail_timeout=2s;
}

upstream keycloak {
    ip_hash;
    server keycloak:8080 fail_timeout=2s;
}
